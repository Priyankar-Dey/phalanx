kind = "web"
previewPath = "/"
title = "PHALANX AI"
version = "1.0.0"
id = "artifacts/phalanx-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21609

[services.development]
run = "pnpm --filter @workspace/phalanx-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/phalanx-ai", "run", "build" ]
publicDir = "artifacts/phalanx-ai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21609"
BASE_PATH = "/"
